document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags, manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin, blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec, re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

gap:16px;margin-top:22px;align-items:start\">\n\n      <!-- BOARD -->\n      <div style=\"background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px 14px;border-bottom:1px solid var(--line)\">\n          <div>\n            <div style=\"font-size:15px;font-weight:700;letter-spacing:-.01em\">Honestly ranked<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-top:3px\">Weight over applause · tap a row to open the score<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-right:2px\">View<\u002Fspan>\n            <button onclick=\"{{ setEveryone }}\" style=\"{{ everyoneBtnStyle }}\">Everyone<\u002Fbutton>\n            <button onclick=\"{{ setOperator }}\" style=\"{{ operatorBtnStyle }}\">Operator<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:32px 1fr 120px 44px 52px;gap:12px;align-items:center;padding:10px 18px\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)\"><\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)\">Request<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)\">{{ revColLabel }}<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)\">Votes<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)\">Score<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"5\">\n          <div style=\"border-top:1px solid var(--line)\">\n            <div onclick=\"{{ row.onToggle }}\" style=\"display:grid;grid-template-columns:32px 1fr 120px 44px 52px;gap:12px;align-items:center;padding:14px 18px;cursor:pointer\" style-hover=\"background:rgba(255,255,255,.02)\">\n              <div style=\"font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:16px;color:var(--accent)\">{{ row.rank }}<\u002Fdiv>\n              <div>\n                <div style=\"font-weight:600;font-size:13.5px;color:var(--text);line-height:1.3\">{{ row.title }}<\u002Fdiv>\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-top:3px\">{{ row.sub }} <span style=\"color:var(--good)\">· {{ row.reach }}<\u002Fspan><sc-if value=\"{{ row.showAccounts }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:var(--accent2)\"> · {{ row.accounts }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <sc-if value=\"{{ row.showExact }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text)\">{{ row.revExact }}<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ row.showBand }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:11px;letter-spacing:2px;color:var(--accent)\">{{ row.bandGlyph }}<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--dim);margin-left:5px\">{{ row.bandLabel }}<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)\">{{ row.votes }}<\u002Fdiv>\n              <div style=\"{{ row.scoreStyle }}\">{{ row.score }}<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ row.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:2px 18px 18px;background:var(--panel2)\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding:12px 0 12px\">What built the {{ row.score }}<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:9px\">\n                  <sc-for list=\"{{ row.factors }}\" as=\"f\" hint-placeholder-count=\"5\">\n                    <div style=\"display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:center\">\n                      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)\">{{ f.k }}<\u002Fspan>\n                      <div style=\"height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden\"><div style=\"{{ f.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n                      <sc-if value=\"{{ f.showRaw }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);white-space:nowrap;min-width:118px;text-align:right\">{{ f.raw }}<\u002Fspan><\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <sc-if value=\"{{ row.note }}\" hint-placeholder-val=\"\"><p style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent2);line-height:1.55;margin:14px 0 0\">{{ row.note }}<\u002Fp><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- FLYWHEEL -->\n      <div style=\"background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <div style=\"font-size:15px;font-weight:700;letter-spacing:-.01em\">The loop<\u002Fdiv>\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--good);display:flex;align-items:center;gap:6px\"><span style=\"width:6px;height:6px;border-radius:50%;background:var(--good);animation:aPulse 2s ease-in-out infinite\"><\u002Fspan>running<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"position:relative;width:300px;height:300px;margin:12px auto 0\">\n          <div style=\"position:absolute;inset:0;border-radius:50%;background:{{ wheel.gradient }};-webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 28px),#000 calc(100% - 28px));mask:radial-gradient(farthest-side,#0000 calc(100% - 28px),#000 calc(100% - 28px));transition:background .5s ease\"><\u002Fdiv>\n          <div style=\"position:absolute;inset:14px;border-radius:50%;border:1px solid var(--line);pointer-events:none\"><\u002Fdiv>\n          <div style=\"position:absolute;inset:-4px;animation:aSpin 16s linear infinite;pointer-events:none\"><div style=\"position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;background:var(--accent2);box-shadow:0 0 12px 2px rgba(231,167,126,.55)\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;padding:0 66px\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.16em;color:var(--dim)\">STEP {{ wheel.num }} / 5<\u002Fdiv>\n            <div style=\"font-size:27px;font-weight:700;letter-spacing:-.02em;margin-top:5px\">{{ wheel.key }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.03em;color:var(--accent2);margin-top:4px\">{{ wheel.role }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ wheel.nodes }}\" as=\"n\" hint-placeholder-count=\"5\">\n            <div onclick=\"{{ n.onSel }}\" style=\"{{ n.style }}\">{{ n.key }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"border-top:1px solid var(--line);margin-top:16px;padding-top:15px\">\n          <span style=\"display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--accent2);background:rgba(194,96,43,.12);border:1px solid rgba(194,96,43,.3);border-radius:999px;padding:4px 11px\">{{ wheel.count }}<\u002Fspan>\n          <p style=\"font-size:13px;line-height:1.6;color:var(--muted);margin:13px 0 0\">{{ wheel.desc }}<\u002Fp>\n          <p style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;line-height:1.7;color:var(--dim);margin:14px 0 0\">Every closed loop builds trust → trust brings sharper signal → the wheel turns itself.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FOOTER -->\n    <div style=\"margin-top:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:2px 4px\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:var(--dim)\">Ana Santana · concept, design &amp; build<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.06em;color:var(--dim)\">built to survive scrutiny<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;boardView&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;Everyone&quot;, &quot;Operator&quot;], &quot;default&quot;: &quot;Everyone&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Demo&quot;}, &quot;wheelSpin&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Demo&quot;}, &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#C2602B&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Brand&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: 'everyone', openRow: -1, wheel: 0 };\n\n  componentDidMount() {\n    if (!(this.props && this.props.wheelSpin === false)) {\n      this._t = setInterval(() => this.setState(s => ({ wheel: (s.wheel + 1) % 5 })), 3000);\n    }\n  }\n  componentWillUnmount() { if (this._t) clearInterval(this._t); }\n  select(i) {\n    if (this._t) { clearInterval(this._t); this._t = setInterval(() => this.setState(s => ({ wheel: (s.wheel + 1) % 5 })), 3000); }\n    this.setState({ wheel: i });\n  }\n\n  stages = [\n    { key:'Capture', role:'Signal comes in',       desc:'Requests arrive from internal teams and the community, attributed, deduped, never merged by theme.', count:'18 in queue',      color:'#C2602B' },\n    { key:'Weigh',   role:'Scored, not guessed',    desc:'The honest score does the ranking, reach and revenue over applause. Every score opens up, none is a black box.', count:'42 weighted',       color:'#CE7B44' },\n    { key:'Present', role:'Carried to product',     desc:'Packed into themes and walked to product on a monthly cadence, with attribution and ARR attached.', count:'6 on the desk',     color:'#7FA98F' },\n    { key:'Decide',  role:'Product answers',        desc:'Move, not pursuing, or learn more, logged in plain language. Assay never decides for them.', count:'4 decided',         color:'#5C978C' },\n    { key:'Close',   role:'The customer is told',   desc:'The loop closes only when the customer hears back. Each close builds trust, and trust sharpens the next signal.', count:'11 closed \\u00b7 30d', color:'#3E6B63' }\n  ];\n\n  board = [\n    { rank:1, title:'Bulk actions across the records grid', sub:'Workflow \\u00b7 on roadmap', reach:'12 acct', band:3, bandLabel:'High', revExact:'$1.24M ARR', accounts:'Northwind, Atlas +2', votes:31, score:94,\n      factors:[{k:'Reach',pct:80,raw:'12 acct \\u00b7 340 users'},{k:'Revenue',pct:88,raw:'$1.24M \\u00b7 4 active'},{k:'Fit',pct:66,raw:'\\u00d72 \\u00b7 operator-set'},{k:'Urgency',pct:58,raw:'2 renew <60d'},{k:'Votes',pct:42,raw:'31 \\u00b7 capped'}] },\n    { rank:2, title:'Offline mode for the mobile app', sub:'Mobile \\u00b7 no match yet', reach:'8 acct', band:4, bandLabel:'Top', revExact:'$2.05M ARR', accounts:'Meridian, Vertex +3', votes:19, score:88,\n      factors:[{k:'Reach',pct:62,raw:'8 acct \\u00b7 210 users'},{k:'Revenue',pct:96,raw:'$2.05M \\u00b7 5 active'},{k:'Fit',pct:66,raw:'\\u00d72'},{k:'Urgency',pct:72,raw:'1 renew <30d'},{k:'Votes',pct:30,raw:'19 \\u00b7 capped'}] },\n    { rank:3, title:'Custom export columns', sub:'Reporting \\u00b7 on roadmap', reach:'15 acct', band:2, bandLabel:'Med', revExact:'$520K ARR', accounts:'9 acct \\u00b7 mid-market', votes:44, score:81,\n      note:'Most votes on the board, and still third. Reach is real; revenue and fit are not. The vote bar cannot carry it.',\n      factors:[{k:'Reach',pct:94,raw:'15 acct \\u00b7 600 users'},{k:'Revenue',pct:48,raw:'$520K \\u00b7 9 active'},{k:'Fit',pct:30,raw:'\\u00d71'},{k:'Urgency',pct:12,raw:'none'},{k:'Votes',pct:100,raw:'44 \\u00b7 most, capped'}] },\n    { rank:4, title:'Two-way sync with the roadmap tool', sub:'Integrations \\u00b7 learn more', reach:'5 acct', band:3, bandLabel:'High', revExact:'$880K ARR', accounts:'Cobalt, Harbor, Pinnacle', votes:12, score:76,\n      factors:[{k:'Reach',pct:40,raw:'5 acct \\u00b7 95 users'},{k:'Revenue',pct:74,raw:'$880K \\u00b7 3 active'},{k:'Fit',pct:96,raw:'\\u00d73 \\u00b7 leadership'},{k:'Urgency',pct:55,raw:'1 renew soon'},{k:'Votes',pct:20,raw:'12'}] },\n    { rank:5, title:'Role-based permissions overhaul', sub:'Admin \\u00b7 on roadmap', reach:'9 acct', band:3, bandLabel:'High', revExact:'$1.02M ARR', accounts:'Summit, Delta +5', votes:27, score:72,\n      factors:[{k:'Reach',pct:60,raw:'9 acct \\u00b7 260 users'},{k:'Revenue',pct:80,raw:'$1.02M \\u00b7 6 active'},{k:'Fit',pct:50,raw:'\\u00d71'},{k:'Urgency',pct:35,raw:'none near'},{k:'Votes',pct:38,raw:'27'}] }\n  ];\n\n  glyph(b){ return '\\u25cf'.repeat(b) + '\\u25cb'.repeat(4 - b); }\n  barColor(p){ return p >= 85 ? 'var(--accent)' : (p >= 55 ? '#C98A5A' : '#3E6B63'); }\n\n  renderVals() {\n    const op = this.state.view === 'operator';\n    const base = \"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;padding:6px 13px;border-radius:999px;cursor:pointer;transition:all .15s;\";\n    const on  = base + \"border:1px solid var(--accent);background:var(--accent);color:#0B211E;font-weight:600;\";\n    const off = base + \"border:1px solid var(--line2);background:transparent;color:var(--muted);\";\n\n    const rows = this.board.map((r, i) => ({\n      rank:r.rank, title:r.title, sub:r.sub, reach:r.reach, votes:r.votes, score:r.score,\n      scoreStyle: \"font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:22px;letter-spacing:-.02em;color:\" + (r.rank === 1 ? '#E7A77E' : '#EAF3F0'),\n      bandGlyph:this.glyph(r.band), bandLabel:r.bandLabel, revExact:r.revExact, accounts:r.accounts,\n      showExact:op, showBand:!op, showAccounts:op,\n      open:this.state.openRow === i,\n      note:r.note || '',\n      factors:r.factors.map(f => ({ k:f.k, raw:f.raw, showRaw:op,\n        barStyle:'height:100%;width:' + f.pct + '%;border-radius:3px;transition:width .45s ease;background:' + this.barColor(f.pct) })),\n      onToggle: () => this.setState(s => ({ openRow: s.openRow === i ? -1 : i }))\n    }));\n\n    const a = this.state.wheel, inactive = '#173A34';\n    const gradient = 'conic-gradient(from -90deg,' + this.stages.map((s, i) => (i === a ? s.color : inactive) + ' ' + (i*20) + '% ' + ((i+1)*20) + '%').join(',') + ')';\n    const pos = [[215.8,59.4],[256.5,184.6],[150,262],[43.5,184.6],[84.2,59.4]];\n    const nodes = this.stages.map((s, i) => ({\n      key:s.key,\n      onSel: () => this.select(i),\n      style: 'position:absolute;left:' + pos[i][0] + 'px;top:' + pos[i][1] + 'px;transform:translate(-50%,-50%);cursor:pointer;font-family:\\'IBM Plex Mono\\',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:999px;white-space:nowrap;transition:all .3s;'\n        + (i === a\n            ? 'background:' + s.color + ';color:#0B211E;font-weight:600;box-shadow:0 0 0 5px ' + s.color + '22;border:1px solid ' + s.color + ';'\n            : 'background:rgba(255,255,255,.03);color:#7C948D;border:1px solid #2C554C;')\n    }));\n    const act = this.stages[a];\n\n    return {\n      accent: (this.props && this.props.accent) || '#C2602B',\n      rows,\n      everyoneBtnStyle: op ? off : on,\n      operatorBtnStyle: op ? on : off,\n      revColLabel: op ? 'ARR' : 'Revenue',\n      setEveryone: () => this.setState({ view:'everyone' }),\n      setOperator: () => this.setState({ view:'operator' }),\n      wheel: { nodes, gradient, num:a+1, key:act.key, role:act.role, desc:act.desc, count:act.count }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
<script>
(function(){
  var LABELS=['Board','Loop','Capture','Stories'];
  function hideBar(){
    var spans=[].slice.call(document.querySelectorAll('span,a')).filter(function(el){
      return el.childElementCount===0 && LABELS.indexOf((el.textContent||'').trim())>-1 && el.getBoundingClientRect().top<72;
    });
    if(spans.length<2) return;
    var anc=spans[0].parentElement;
    while(anc && !spans.every(function(s){return anc.contains(s);})) anc=anc.parentElement;
    if(anc && anc.textContent.indexOf('assay')===-1 && anc.textContent.indexOf('RUNNING')===-1){
      if(anc.style.display!=='none') anc.style.display='none';
    } else {
      spans.forEach(function(s){ if(s.style.display!=='none') s.style.display='none'; });
    }
  }
  function loop(n){hideBar(); if(n>0) setTimeout(function(){loop(n-1)},160);}
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',function(){loop(16)}); else loop(16);
  try{new MutationObserver(hideBar).observe(document.documentElement,{childList:true,subtree:true});}catch(e){}
})();
</script>
